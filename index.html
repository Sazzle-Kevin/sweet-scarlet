<!doctype html>

    <!-- Tailwind -->

    <!-- Farben hier definieren -->
    <style type="text/tailwindcss">
      @theme {
        --color-light-red: rgb(220, 38, 38);

          </li>

            >
          </li>
          <li class="w-1/4 h-full text-center">

            >
          </li>
        </ul>
      </nav>
      <nav

        <ul class="w-full h-full flex justify-evenly items-center m-0 p-0">
          <li class="w-1/3 h-full text-center">

            >
          </li>
          <li class="w-1/3 h-full text-center">

          <li class="w-1/3 h-full text-center">
            <a href="/" class="flex w-full h-full justify-center items-center"

            >
          </li>
        </ul>
      </nav>
      <div
        class="hidden md:flex fixed fixed w-full -bottom-19 z-10 flex justify-center pointer-events-none"
      >
        <img
          src="Erdbeere_3.png"
          alt=""
          class="w-[250px] h-auto group-hover:-translate-y-9 transition-all duration-600 ease-out"
        />

    <main class="flex-grow">
